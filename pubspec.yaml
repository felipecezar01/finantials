name: finantials
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- SUAS DEPENDÊNCIAS ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  # -------------------------

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # --- ADICIONADO PARA GERAR O ÍCONE ---
  flutter_launcher_icons: ^0.13.1
  # -------------------------------------

flutter:
  uses-material-design: true

  # --- ADICIONADO: REGISTRO DOS ASSETS ---
  assets:
    - assets/icon.png
  # ---------------------------------------

# --- CONFIGURAÇÃO DO GERADOR DE ÍCONES ---
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png" # Caminho da sua imagem
  min_sdk_android: 21
# -----------------------------------------